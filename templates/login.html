<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱快自动备份</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Cdefs%3E%3ClinearGradient id='macGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%235AC8FA'/%3E%3Cstop offset='100%25' stop-color='%23007AFF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='256' height='256' rx='60' fill='url(%23macGrad)'/%3E%3Cpath d='M184 172H88c-22.1 0-40-17.9-40-40 0-21.4 16.8-38.9 38-39.9C91.9 69.3 113.8 52 138 52c24.6 0 45.4 17.7 50.4 41.1 2.5-.7 5-1.1 7.6-1.1 22.1 0 40 17.9 40 40 0 22.1-17.9 40-40 40z' fill='%23FFFFFF'/%3E%3Cpath d='M138 92c-15.5 0-28 12.5-28 28h-8l14 14 14-14h-8c0-11 9-20 20-20s20 9 20 20-9 20-20 20c-3.3 0-6.4-.8-9.2-2.2l-5.8 5.8c4.3 2.8 9.4 4.4 15 4.4 15.5 0 28-12.5 28-28s-12.5-28-28-28z' fill='%23007AFF'/%3E%3C/svg%3E">
    <style>
        :root {
            --apple-blue: #007AFF;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #E2D1C3 0%, #FDFCFB 100%);
        }
        .login-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 40px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .logo-icon {
            margin-bottom: 15px;
        }
        h2 { margin: 0 0 8px 0; font-weight: 600; color: #1D1D1F; font-size: 22px; }
        p { color: #86868B; font-size: 14px; margin-bottom: 30px; font-weight: 500; }
        
        .input-group { margin-bottom: 16px; }
        input {
            width: 100%; box-sizing: border-box;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.8);
            font-size: 15px; outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
            background: #fff;
        }
        .btn {
            width: 100%; padding: 12px;
            border-radius: 12px;
            background-color: var(--apple-blue);
            color: white; border: none; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-top: 10px;
        }
        .btn:hover { background-color: #0062CC; transform: scale(0.98); }
        .error-msg { color: #FF3B30; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="macGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#5AC8FA" />
                    <stop offset="100%" stop-color="#007AFF" />
                </linearGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity="0.15"/>
                </filter>
            </defs>
            <rect width="256" height="256" rx="60" fill="url(#macGrad)" filter="url(#shadow)"/>
            <path d="M184 172H88c-22.1 0-40-17.9-40-40 0-21.4 16.8-38.9 38-39.9C91.9 69.3 113.8 52 138 52c24.6 0 45.4 17.7 50.4 41.1 2.5-.7 5-1.1 7.6-1.1 22.1 0 40 17.9 40 40 0 22.1-17.9 40-40 40z" fill="#FFFFFF"/>
            <path d="M138 92c-15.5 0-28 12.5-28 28h-8l14 14 14-14h-8c0-11 9-20 20-20s20 9 20 20-9 20-20 20c-3.3 0-6.4-.8-9.2-2.2l-5.8 5.8c4.3 2.8 9.4 4.4 15 4.4 15.5 0 28-12.5 28-28s-12.5-28-28-28z" fill="#007AFF"/>
        </svg>
    </div>
    <h2>爱快自动备份</h2>
    <p>数据安全最重要</p>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="账号" autocomplete="off">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="密码" autocomplete="off" onkeypress="handleEnter(event)">
    </div>
    <button class="btn" onclick="login()">登 录</button>
    <div class="error-msg" id="errorMsg">账号或密码错误</div>
</div>

<script>
    function handleEnter(e) { if(e.key === 'Enter') login(); }

    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        })
        .then(res => {
            if(res.ok) window.location.href = '/';
            else {
                document.getElementById('errorMsg').style.display = 'block';
                const box = document.querySelector('.login-container');
                box.style.transform = 'translateX(-5px)';
                setTimeout(() => box.style.transform = 'translateX(5px)', 100);
                setTimeout(() => box.style.transform = 'translateX(0)', 200);
            }
        });
    }
</script>
</body>
</html>
